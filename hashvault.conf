# /etc/zabbix/zabbix_agentd.d/hashvault.conf
# HashVault mining pool monitoring
#
# Usage: hashvault[<wallet_address>,<metric>]
# Example: hashvault[42Gfm...,collective.hashRate]
#
# Install:
#   1. Place hashvault_zabbix.py in /etc/zabbix/scripts/
#   2. chmod +x /etc/zabbix/scripts/hashvault_zabbix.py
#   3. Copy this file to /etc/zabbix/zabbix_agentd.d/
#   4. Restart zabbix-agent: systemctl restart zabbix-agent
#   5. Test: zabbix_agentd -t 'hashvault[42Gfm,collective.hashRate]'

UserParameter=hashvault[*],/etc/zabbix/scripts/hashvault_zabbix.py "$1" "$2"
